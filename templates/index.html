<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OKLCH Lab</title>
    <script src="https://unpkg.com/htmx.org@1.9.10" defer></script>
    <style>
        :root {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: #0f1419;
            background: #f6f8fa;
        }

        body {
            margin: 0;
            padding: 2rem 1rem;
            display: flex;
            justify-content: center;
        }

        main {
            width: min(720px, 100%);
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(15, 20, 25, 0.08);
            padding: 2rem;
        }

        h1 {
            margin-top: 0;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        label {
            display: flex;
            flex-direction: column;
            font-weight: 600;
            gap: 0.5rem;
        }

        input[type="range"] {
            width: 100%;
        }

        .preview-card {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 1.5rem;
            background: #fdfdfd;
        }

        .swatch {
            height: 160px;
            border-radius: 10px;
            border: 1px solid rgba(0, 0, 0, 0.1);
        }

        .values {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 0.5rem;
            font-family: "JetBrains Mono", "Fira Mono", monospace;
            font-size: 0.95rem;
        }

        .css-line {
            font-family: "JetBrains Mono", "Fira Mono", monospace;
            font-size: 0.9rem;
            background: #f1f5f9;
            padding: 0.6rem 0.8rem;
            border-radius: 8px;
        }
    </style>
</head>
<body>
<main>
    <h1>OKLCH Lab</h1>
    <p>Play with OKLCH sliders to explore perceptually uniform colors. The preview updates live with htmx, no custom JavaScript needed.</p>

    <form id="controls" hx-get="/preview" hx-target="#preview" hx-trigger="input" hx-swap="innerHTML">
        <label>
            <span>Lightness L (0 - 1)</span>
            <input class="slider" type="range" name="l" min="0" max="1" step="0.01" value="{{ params.l }}">
        </label>

        <label>
            <span>Chroma C (0 - 0.4)</span>
            <input class="slider" type="range" name="c" min="0" max="0.4" step="0.005" value="{{ params.c }}">
        </label>

        <label>
            <span>Hue H (0 - 360)</span>
            <input class="slider" type="range" name="h" min="0" max="360" step="1" value="{{ params.h }}">
        </label>
    </form>

    <section id="preview" class="preview-card">
        {% include "preview.html" %}
    </section>
</main>
</body>
</html>
